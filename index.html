<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI运维视频自动播放</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }

        body {
            background-color: #f5f7fa;
            padding: 30px 0;
        }

        /* 视频容器美化 */
        .video-container {
            width: 85%;
            margin: 0 auto 25px;
            max-width: 1200px;
            background: #fff;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        }

        video {
            width: 100%;
            height: auto;
            border-radius: 8px;
            display: block;
        }

        /* 按钮组样式 */
        .btn-group {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            margin-top: 10px;
        }

        /* 统一按钮样式 */
        .control-btn {
            padding: 10px 22px;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            color: #fff;
        }

        /* 声音按钮 */
        .audio-btn {
            background-color: #409eff;
        }
        .audio-btn:hover {
            background-color: #337ecc;
        }

        /* 全屏按钮 */
        .fullscreen-btn {
            background-color: #67c23a;
        }
        .fullscreen-btn:hover {
            background-color: #529b2e;
        }

        /* 停止按钮 */
        .stop-btn {
            background-color: #f56c6c;
        }
        .stop-btn:hover {
            background-color: #d45c5c;
        }

        /* 播放按钮（隐藏默认） */
        .play-btn {
            background-color: #e6a23c;
            display: none;
        }
        .play-btn:hover {
            background-color: #b88223;
        }
    </style>
</head>
<body>
    <div class="video-container">
        <video 
            id="aiVideo"
            src="https://megoo.tos-cn-beijing.volces.com/AI%E8%BF%90%E7%BB%B4.mp4"
            autoplay 
            muted 
            loop
            playsinline
            preload="auto"
        >
            您的浏览器不支持HTML5视频播放，请更换现代浏览器（如Chrome/Edge/Firefox）
        </video>
    </div>

    <!-- 控制按钮组 -->
    <div class="btn-group">
  
        <button class="control-btn fullscreen-btn" onclick="toggleFullScreen()">
            全屏播放
        </button>
        <button class="control-btn stop-btn" onclick="stopVideo()">
            停止播放
        </button>
        <button class="control-btn play-btn" onclick="playVideo()">
            重新播放
        </button>
    </div>

    <script>
        const video = document.getElementById('aiVideo');
        const audioBtn = document.querySelector('.audio-btn');
        const playBtn = document.querySelector('.play-btn');
        const stopBtn = document.querySelector('.stop-btn');

        // 声音开关（切换）
        function toggleAudio() {
            if (video.muted) {
                video.muted = false;
                audioBtn.textContent = "关闭视频声音";
            } else {
                video.muted = true;
                audioBtn.textContent = "开启视频声音";
            }
            video.play();
        }

        // 全屏播放
        function toggleFullScreen() {
            if (video.requestFullscreen) {
                video.requestFullscreen();
            } else if (video.webkitRequestFullscreen) { // 兼容 Safari
                video.webkitRequestFullscreen();
            } else if (video.msRequestFullscreen) { // 兼容 IE
                video.msRequestFullscreen();
            }
        }

        // 停止播放
        function stopVideo() {
            video.pause();
            video.currentTime = 0; // 回到视频开头
            stopBtn.style.display = "none";
            playBtn.style.display = "inline-block";
        }

        // 重新播放
        function playVideo() {
            video.play();
            stopBtn.style.display = "inline-block";
            playBtn.style.display = "none";
        }

        // 视频错误处理
        video.addEventListener('error', function(e) {
            alert(`视频播放失败：${e.target.error.message}，请稍后重试`);
            console.log('视频错误详情：', e.target.error);
        });
    </script>
</body>
</html>
